name: mobile
description: "Bookish Corner mobile application"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  file_picker: ^11.0.0
  cached_network_image: ^3.4.0
  uuid: ^4.5.0
  path: ^1.9.0
  gap: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#08111D"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
